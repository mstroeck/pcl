name: 'Plan Council'
description: 'Multi-model AI planning tool with consensus voting for GitHub issues'
branding:
  icon: 'users'
  color: 'blue'

inputs:
  issue-number:
    description: 'GitHub issue number to plan for'
    required: true
  models:
    description: 'Comma-separated models to use (e.g., claude-3-7-sonnet,gpt-4o,gemini-2.0-flash-thinking-exp)'
    required: false
  depth:
    description: 'Planning depth: high-level | detailed | implementation'
    required: false
    default: 'detailed'
  max-cost:
    description: 'Maximum cost budget in USD (action fails if estimate exceeds this)'
    required: false
  research:
    description: 'Enable domain research (opt-in, adds cost and latency)'
    required: false
    default: 'false'
  research-provider:
    description: 'Research provider to use (perplexity, openai-compat)'
    required: false
  research-model:
    description: 'Model to use for research'
    required: false
  anthropic-api-key:
    description: 'Anthropic API key'
    required: false
  openai-api-key:
    description: 'OpenAI API key'
    required: false
  google-api-key:
    description: 'Google API key'
    required: false
  perplexity-api-key:
    description: 'Perplexity API key (for research)'
    required: false
  github-token:
    description: 'GitHub token for posting comments'
    required: true

outputs:
  plan-summary:
    description: 'Summary of the generated plan'
    value: ''  # Not yet captured from a step; add when plan-summary output is implemented
  estimated-cost:
    description: 'Estimated cost of the planning operation in USD'
    value: ${{ steps.estimate.outputs.estimated-cost }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      # Pinned to commit SHA (actions/setup-node v4.4.0) rather than a moving
      # tag so unreviewed upstream changes cannot run in this workflow.
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
      with:
        node-version: '20'

    - name: Install Plan Council
      shell: bash
      run: |
        npm install -g plan-council@0.1.0

    # Mask secrets BEFORE they are used anywhere so they are never logged in
    # plaintext.  Inputs are passed via env: to avoid inline ${{ }} expansion
    # inside run: scripts (which would be visible in the workflow definition).
    - name: Mask secrets in logs
      shell: bash
      env:
        INPUT_ANTHROPIC_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_OPENAI_KEY: ${{ inputs.openai-api-key }}
        INPUT_GOOGLE_KEY: ${{ inputs.google-api-key }}
        INPUT_PERPLEXITY_KEY: ${{ inputs.perplexity-api-key }}
      run: |
        [ -n "$INPUT_ANTHROPIC_KEY" ] && echo "::add-mask::$INPUT_ANTHROPIC_KEY"
        [ -n "$INPUT_OPENAI_KEY" ] && echo "::add-mask::$INPUT_OPENAI_KEY"
        [ -n "$INPUT_GOOGLE_KEY" ] && echo "::add-mask::$INPUT_GOOGLE_KEY"
        [ -n "$INPUT_PERPLEXITY_KEY" ] && echo "::add-mask::$INPUT_PERPLEXITY_KEY"

    - name: Estimate cost
      id: estimate
      shell: bash
      env:
        # Pass non-secret inputs via env: (not inline) to prevent shell injection.
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        INPUT_REPO: ${{ github.repository }}
        INPUT_MODELS: ${{ inputs.models }}
        INPUT_DEPTH: ${{ inputs.depth }}
        INPUT_RESEARCH: ${{ inputs.research }}
        INPUT_RESEARCH_PROVIDER: ${{ inputs.research-provider }}
        INPUT_RESEARCH_MODEL: ${{ inputs.research-model }}
        # API keys passed per-step so they never touch GITHUB_ENV plaintext.
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        PERPLEXITY_API_KEY: ${{ inputs.perplexity-api-key }}
      run: |
        # Validate inputs before use to prevent shell injection.
        if ! [[ "$INPUT_ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
          echo "::error::issue-number must be numeric, got: '$INPUT_ISSUE_NUMBER'"
          exit 1
        fi
        if [ -n "$INPUT_MODELS" ] && ! [[ "$INPUT_MODELS" =~ ^[a-zA-Z0-9._,\-]+$ ]]; then
          echo "::error::models contains invalid characters (allowed: a-zA-Z0-9._,-)"
          exit 1
        fi

        # Build command as a bash array to avoid word-splitting on variable values.
        ESTIMATE_CMD=(pcl plan "${INPUT_REPO}#${INPUT_ISSUE_NUMBER}" --estimate)

        if [ -n "$INPUT_MODELS" ]; then
          ESTIMATE_CMD+=("--models" "$INPUT_MODELS")
        fi

        if [ -n "$INPUT_DEPTH" ]; then
          ESTIMATE_CMD+=("--depth" "$INPUT_DEPTH")
        fi

        if [ "$INPUT_RESEARCH" = "true" ]; then
          ESTIMATE_CMD+=("--research")
          if [ -n "$INPUT_RESEARCH_PROVIDER" ]; then
            ESTIMATE_CMD+=("--research-provider" "$INPUT_RESEARCH_PROVIDER")
          fi
          if [ -n "$INPUT_RESEARCH_MODEL" ]; then
            ESTIMATE_CMD+=("--research-model" "$INPUT_RESEARCH_MODEL")
          fi
        fi

        echo "Running: pcl plan '${INPUT_REPO}#${INPUT_ISSUE_NUMBER}' --estimate [...]"
        ESTIMATE_OUTPUT=$("${ESTIMATE_CMD[@]}")
        echo "$ESTIMATE_OUTPUT"

        # NOTE: This parses human-readable output from formatCostEstimate().
        # If the output format changes (e.g. internationalised decimal separators),
        # this will silently fall back to "0". A structured --json flag would be
        # more robust; tracked in issue #TODO.
        # Use [0-9]+\.[0-9]+ to reject malformed numbers such as "1..2" or ".5".
        COST=$(echo "$ESTIMATE_OUTPUT" | grep -oE 'Total: \$[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+' || echo "0")
        echo "estimated-cost=$COST" >> "$GITHUB_OUTPUT"
        echo "ESTIMATED_COST=$COST" >> "$GITHUB_ENV"

    - name: Check cost budget
      shell: bash
      env:
        INPUT_MAX_COST: ${{ inputs.max-cost }}
      run: |
        if [ -n "$INPUT_MAX_COST" ]; then
          MAX_COST="$INPUT_MAX_COST"
          # ESTIMATED_COST is set by the estimate step via GITHUB_ENV

          # Validate that both values are numeric before passing to bc to prevent injection
          if ! echo "$ESTIMATED_COST" | grep -qE '^[0-9]+(\.[0-9]+)?$'; then
            echo "::warning::Invalid estimated cost format, skipping budget check"
            exit 0
          fi
          if ! echo "$MAX_COST" | grep -qE '^[0-9]+(\.[0-9]+)?$'; then
            echo "::warning::Invalid max-cost format, skipping budget check"
            exit 0
          fi

          # Compare costs using bc for floating point
          if command -v bc &> /dev/null; then
            OVER_BUDGET=$(echo "$ESTIMATED_COST > $MAX_COST" | bc)
            if [ "$OVER_BUDGET" -eq 1 ]; then
              echo "::error::Estimated cost (\$$ESTIMATED_COST) exceeds max budget (\$$MAX_COST)"
              exit 1
            fi
          else
            echo "::warning::bc not found, skipping cost check"
          fi

          echo "::notice::Cost check passed: \$$ESTIMATED_COST <= \$$MAX_COST"
        fi

    - name: Generate and post plan
      shell: bash
      env:
        # Pass token via env var so it is never visible in the process list.
        GITHUB_TOKEN: ${{ inputs.github-token }}
        # Pass non-secret inputs via env: (not inline) to prevent shell injection.
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        INPUT_REPO: ${{ github.repository }}
        INPUT_MODELS: ${{ inputs.models }}
        INPUT_DEPTH: ${{ inputs.depth }}
        INPUT_RESEARCH: ${{ inputs.research }}
        INPUT_RESEARCH_PROVIDER: ${{ inputs.research-provider }}
        INPUT_RESEARCH_MODEL: ${{ inputs.research-model }}
        # API keys passed per-step so they never touch GITHUB_ENV plaintext.
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        PERPLEXITY_API_KEY: ${{ inputs.perplexity-api-key }}
      run: |
        # Validate inputs before use to prevent shell injection.
        if ! [[ "$INPUT_ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
          echo "::error::issue-number must be numeric, got: '$INPUT_ISSUE_NUMBER'"
          exit 1
        fi
        if [ -n "$INPUT_MODELS" ] && ! [[ "$INPUT_MODELS" =~ ^[a-zA-Z0-9._,\-]+$ ]]; then
          echo "::error::models contains invalid characters (allowed: a-zA-Z0-9._,-)"
          exit 1
        fi

        # Build command as a bash array to avoid word-splitting on variable values.
        PLAN_CMD=(pcl plan "${INPUT_REPO}#${INPUT_ISSUE_NUMBER}" --post)

        if [ -n "$INPUT_MODELS" ]; then
          PLAN_CMD+=("--models" "$INPUT_MODELS")
        fi

        if [ -n "$INPUT_DEPTH" ]; then
          PLAN_CMD+=("--depth" "$INPUT_DEPTH")
        fi

        if [ "$INPUT_RESEARCH" = "true" ]; then
          PLAN_CMD+=("--research")
          if [ -n "$INPUT_RESEARCH_PROVIDER" ]; then
            PLAN_CMD+=("--research-provider" "$INPUT_RESEARCH_PROVIDER")
          fi
          if [ -n "$INPUT_RESEARCH_MODEL" ]; then
            PLAN_CMD+=("--research-model" "$INPUT_RESEARCH_MODEL")
          fi
        fi

        echo "Running: pcl plan '${INPUT_REPO}#${INPUT_ISSUE_NUMBER}' --post [...]"
        "${PLAN_CMD[@]}"

    - name: Output summary
      shell: bash
      env:
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
      run: |
        echo "::notice::Plan generated successfully for issue #${INPUT_ISSUE_NUMBER}"
        echo "::notice::Estimated cost: \$$ESTIMATED_COST"
